<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek V4 对话测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #model-select {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        #clear-btn {
            padding: 8px 16px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            background: transparent;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #clear-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            text-align: right;
        }

        .message-content {
            display: inline-block;
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: #e9ecef;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message.assistant .message-content pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .message.assistant .message-content code {
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9em;
            color: #e83e8c;
        }

        .message.assistant .message-content pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }

        .message .timestamp {
            font-size: 0.75rem;
            color: #999;
            margin-top: 4px;
        }

        .message.user .timestamp {
            text-align: right;
        }

        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 12px 16px;
            background: #e9ecef;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        #user-input {
            flex: 1;
            min-height: 60px;
            max-height: 150px;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 1rem;
            resize: none;
            font-family: inherit;
            line-height: 1.5;
            transition: border-color 0.3s ease;
        }

        #user-input:focus {
            outline: none;
            border-color: #667eea;
        }

        #send-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        #send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            text-align: center;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>DeepSeek V4 对话测试</h1>
            <div class="controls">
                <select id="model-select">
                    <option value="deepseek-v4-flash">deepseek-v4-flash</option>
                    <option value="deepseek-v4-pro">deepseek-v4-pro</option>
                </select>
                <button id="clear-btn">清空历史</button>
            </div>
        </header>
        <div id="chat-container">
            <div id="messages"></div>
        </div>
        <div class="input-area">
            <textarea id="user-input" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)"></textarea>
            <button id="send-btn">发送</button>
        </div>
    </div>
    <script src="api-key.js"></script>
    <script>
        const messagesContainer = document.getElementById('messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const modelSelect = document.getElementById('model-select');
        const clearBtn = document.getElementById('clear-btn');
        const chatContainer = document.getElementById('chat-container');

        const STORAGE_KEY = 'deepseek-chat-history';
        const MAX_HISTORY = 50;
        let isStreaming = false;

        // 格式化时间戳
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // 从 localStorage 加载历史记录
        function loadHistory() {
            try {
                const history = localStorage.getItem(STORAGE_KEY);
                return history ? JSON.parse(history) : [];
            } catch (e) {
                console.error('加载历史记录失败:', e);
                return [];
            }
        }

        // 保存历史到 localStorage
        function saveHistory(history) {
            try {
                // 限制最大条数
                if (history.length > MAX_HISTORY) {
                    history = history.slice(-MAX_HISTORY);
                }
                localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
            } catch (e) {
                console.error('保存历史记录失败:', e);
            }
        }

        // 添加消息到界面和历史
        function addMessage(role, content, timestamp = Date.now()) {
            const history = loadHistory();
            history.push({ role, content, timestamp });
            saveHistory(history);

            renderMessage(role, content, timestamp);
        }

        // 渲染单条消息
        function renderMessage(role, content, timestamp) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            // 处理代码块
            contentDiv.innerHTML = formatContent(content);

            const timestampDiv = document.createElement('div');
            timestampDiv.className = 'timestamp';
            timestampDiv.textContent = formatTime(timestamp);

            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(timestampDiv);
            messagesContainer.appendChild(messageDiv);

            scrollToBottom();
        }

        // 格式化内容（处理代码块）
        function formatContent(content) {
            // 转义 HTML
            let formatted = content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            // 处理代码块
            formatted = formatted.replace(/```(\w*)\n?([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre><code>${code.trim()}</code></pre>`;
            });

            // 处理行内代码
            formatted = formatted.replace(/`([^`]+)`/g, '<code>$1</code>');

            // 换行符转换为 <br>
            formatted = formatted.replace(/\n/g, '<br>');

            return formatted;
        }

        // 滚动到底部
        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 显示空状态
        function showEmptyState() {
            if (messagesContainer.children.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'empty-state';
                emptyDiv.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <p>开始对话吧</p>
                `;
                messagesContainer.appendChild(emptyDiv);
            }
        }

        // 显示打字指示器
        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.className = 'message assistant';
            indicator.id = 'typing-indicator';
            indicator.innerHTML = `
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            messagesContainer.appendChild(indicator);
            scrollToBottom();
        }

        // 移除打字指示器
        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) {
                indicator.remove();
            }
        }

        // 显示错误消息
        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = message;
            messagesContainer.appendChild(errorDiv);
            scrollToBottom();
        }

        // 发送消息
        async function sendMessage() {
            if (isStreaming) return;

            const content = userInput.value.trim();
            if (!content) return;

            // 移除空状态
            const emptyState = messagesContainer.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            // 添加用户消息
            addMessage('user', content);
            userInput.value = '';
            userInput.style.height = 'auto';

            // 显示打字指示器
            isStreaming = true;
            sendBtn.disabled = true;
            showTypingIndicator();

            // 准备历史记录
            const history = loadHistory();
            const messages = history.map(h => ({
                role: h.role,
                content: h.content
            }));

            try {
                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: modelSelect.value,
                        messages: messages,
                        stream: true
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || `请求失败: ${response.status}`);
                }

                await handleStreamResponse(response);
            } catch (error) {
                removeTypingIndicator();
                showError(`错误: ${error.message}`);
            } finally {
                isStreaming = false;
                sendBtn.disabled = false;
            }
        }

        // 处理流式响应
        async function handleStreamResponse(response) {
            removeTypingIndicator();

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let assistantContent = '';

            // 创建助手消息元素
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            const timestampDiv = document.createElement('div');
            timestampDiv.className = 'timestamp';
            timestampDiv.textContent = formatTime(Date.now());
            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(timestampDiv);
            messagesContainer.appendChild(messageDiv);

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === '[DONE]') continue;

                        try {
                            const json = JSON.parse(data);
                            const delta = json.choices?.[0]?.delta?.content;
                            if (delta) {
                                assistantContent += delta;
                                contentDiv.innerHTML = formatContent(assistantContent);
                                scrollToBottom();
                            }
                        } catch (e) {
                            // 忽略解析错误
                        }
                    }
                }
            }

            // 保存到历史
            const history = loadHistory();
            history.push({ role: 'assistant', content: assistantContent, timestamp: Date.now() });
            saveHistory(history);
        }

        // 清空历史
        function clearHistory() {
            localStorage.removeItem(STORAGE_KEY);
            messagesContainer.innerHTML = '';
            showEmptyState();
        }

        // 自动调整 textarea 高度
        function autoResize() {
            userInput.style.height = 'auto';
            userInput.style.height = Math.min(userInput.scrollHeight, 150) + 'px';
        }

        // 事件监听
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        userInput.addEventListener('input', autoResize);

        sendBtn.addEventListener('click', sendMessage);

        clearBtn.addEventListener('click', () => {
            if (confirm('确定要清空所有对话历史吗？')) {
                clearHistory();
            }
        });

        // 初始化
        function init() {
            const history = loadHistory();
            if (history.length > 0) {
                history.forEach(h => renderMessage(h.role, h.content, h.timestamp));
            } else {
                showEmptyState();
            }
        }

        init();
    </script>
</body>
</html>
